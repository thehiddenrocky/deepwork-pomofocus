<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="titlebar">
      <div class="logo">
        <br />
        <br />
        <img src="../home/images/settings.png" id="icon" />
        <h1>&nbsp;Settings</h1>
      </div>
      <div class="action-btn">
        <div class="min btn-change-cursor" id="SettingMin">
          <img src="../home/images/min.png" alt="" />
        </div>
        <div class="close btn-change-cursor" id="SettingClose">
          <img src="../home/images/close.png" alt="" />
        </div>
      </div>
    </div>
    <!-- theme -->
    <div class="container-q" style="visibility: hidden">
      <!--underdev darkmode and lightmode ^^^ -->
      <h2>Dark Mode</h2>
      <input type="checkbox" id="dark-theme" />
    </div>
    <!-- time-data -->
    <div class="container-q">
      <h2>Always on top</h2>
      <input id="always-on-top" type="checkbox" />
    </div>
    <div class="container-q">
      <h2>Focus</h2>
      <input id="focus-time" type="text" value="25:00" />
    </div>
    <div class="container-q">
      <h2>Short Break</h2>
      <input id="shortbreak-time" type="text" value="05:00" />
    </div>
    <div class="container-q">
      <h2>Long Break</h2>
      <input id="longbreak-time" type="text" value="15:00" />
    </div>

    <div class="container-q">
      <h2>Project 1 Name</h2>
      <input id="project1-name" type="text" value="P1" />
    </div>
    <div class="container-q">
      <h2>Project 2 Name</h2>
      <input id="project2-name" type="text" value="P2" />
    </div>
    <div class="container-q">
      <h2>Project 3 Name</h2>
      <input id="project3-name" type="text" value="P3" />
    </div>

    <div class="container-q"></div>
    <button class="save-btn btn-change-cursor" id="save-btn">Save</button>
  </body>

  <script defer>
    require("../renderer.js");
  </script>
  <script src="index.js"></script>
</html>
